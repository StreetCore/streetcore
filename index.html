<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreetCore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#111;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:black;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav a{
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1523398002811-999ca8dec234") center/cover;
display:flex;
align-items:center;
padding-left:60px;
}

.hero-text h1{
font-size:60px;
}

.hero-text p{
margin:20px 0;
font-size:18px;
}

.btn{
background:white;
color:black;
padding:12px 25px;
text-decoration:none;
font-weight:bold;
}

/* PRODUCTOS */

.products{
padding:60px;
text-align:center;
}

.products h2{
font-size:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#1a1a1a;
padding:20px;
}

.card img{
width:100%;
}

.card h3{
margin:15px 0;
}

.card button{
padding:10px 20px;
border:none;
background:white;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:60px;
padding:30px;
text-align:center;
background:black;
color:gray;
}

</style>
</head>

<body>

<nav>
<div class="logo">StreetCore</div>

<ul>
<li><a href="#">Inicio</a></li>
<li><a href="#">Tienda</a></li>
<li><a href="#">Hombres</a></li>
<li><a href="#">Mujeres</a></li>
<li><a href="#">Contacto</a></li>
</ul>
</nav>

<section class="hero">
<div class="hero-text">
<h1>StreetCore</h1>
<p>La esencia de la calle.</p>
<a class="btn" href="#">Comprar ahora</a>
</div>
</section>

<section class="products">

<h2>Productos destacados</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Remera StreetCore</h3>
<p>$20</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516826957135-700dedea698c">
<h3>Buzo StreetCore</h3>
<p>$35</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922203-bf9c1b29a2a9">
<h3>Gorra StreetCore</h3>
<p>$15</p>
<button>Comprar</button>
</div>

</div>

</section>

<footer>
<p>© 2026 StreetCore - Todos los derechos reservados</p>
</footer>

</body>
</html>
